<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ - ระบบข้อมูลที่ราชพัสดุ</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary-green: #007A48;
    --dark-green: #005c36;
    --accent-gold: #D4AF37;
    --text-dark: #2c3e50;
    --glass-bg: rgba(255, 255, 255, 0.88);
    --glass-border: rgba(255, 255, 255, 0.4);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Prompt', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* พื้นหลังแนวธรรมชาติ+อาคารสำนักงาน ผสมกับเลเยอร์สีเขียวหัวเป็ดจางๆ ให้ดูน่าเชื่อถือ */
    background: linear-gradient(135deg, rgba(0, 56, 33, 0.65), rgba(0, 122, 72, 0.45)), 
                url('https://images.unsplash.com/photo-1577495508048-b635879837f1?auto=format&fit=crop&w=1200&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* ตัวการ์ดเข้าสู่ระบบสไตล์กระจกฝ้า (Glassmorphism) */
.login-box {
    width: 400px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px 35px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.22);
    text-align: center;
    position: relative;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeInUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* จัดวางโลโก้กรมธนารักษ์ให้ลอยขึ้นเหนือขอบการ์ดเล็กน้อย เพิ่มมิติ */
.logo {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 10px;
    border-radius: 50%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo img {
    width: 80px;
    height: 80px;
    object-fit: contain;
}

/* หัวข้อและคำอธิบาย */
h2 {
    color: var(--primary-green);
    margin-top: 45px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 30px;
    font-weight: 400;
}

/* ส่วนครอบคลุมช่องกรอกข้อมูล */
.input-label {
    text-align: left;
    display: block;
    font-size: 13.5px;
    color: var(--text-dark);
    margin-bottom: 6px;
    font-weight: 500;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 14px 45px;
    border: 1px solid rgba(0, 0, 0, 0.12);
    border-radius: 14px;
    outline: none;
    font-size: 15px;
    color: var(--text-dark);
    background: rgba(255, 255, 255, 0.75);
    transition: all 0.3s ease;
}

/* เอฟเฟกต์เรืองแสงเมื่อคลิกเลือกช่องกรอก */
.input-group input:focus {
    border-color: var(--primary-green);
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(0, 122, 72, 0.15);
}

/* จัดตำแหน่งไอคอนภายในช่องกรอก */
.input-group i {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    transition: all 0.3s ease;
}

.input-group i.left {
    left: 16px;
    color: #888;
}

/* เปลี่ยนสีไอคอนด้านซ้ายเมื่อผู้ใช้กำลังพิมพ์ */
.input-group input:focus ~ i.left {
    color: var(--primary-green);
}

.input-group i.right {
    right: 16px;
    color: #aaa;
    cursor: pointer;
}

.input-group i.right:hover {
    color: var(--primary-green);
}

/* ปุ่มกดสไตล์หรูหรา ไล่เฉดสี */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0, 122, 72, 0.3);
    transition: all 0.3s ease;
    margin-top: 15px; /* ปรับระยะห่างด้านบนเพิ่มเล็กน้อยแทนจุดที่ลบไป */
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(0, 122, 72, 0.4);
    filter: brightness(1.1);
}

button:active {
    transform: translateY(0);
}

/* กล่องแสดงข้อความเตือนความผิดพลาด */
#error {
    margin-top: 15px;
    color: #d32f2f;
    font-size: 13.5px;
    min-height: 20px;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/th/8/81/The_Treasury_Department_Logo.png" alt="โลโก้กรมธนารักษ์">
    </div>

    <h2>เข้าสู่ระบบ</h2>
    <div class="subtitle">ระบบสืบค้นราคาประเมินที่ราชพัสดุ</div>

    <label class="input-label" for="username">ชื่อผู้ใช้งาน</label>
    <div class="input-group">
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" onkeyup="checkEnter(event)">
        <i class="fa fa-user left"></i>
    </div>

    <label class="input-label" for="password">รหัสผ่าน</label>
    <div class="input-group">
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน" onkeyup="checkEnter(event)">
        <i class="fa fa-lock left"></i>
        <i class="fa fa-eye right" id="toggleIcon" onclick="togglePass()"></i>
    </div>

    <button onclick="login()">เข้าสู่ระบบ</button>

    <div id="error"></div>
</div>

<script>
// ข้อมูลผู้ใช้จำลองสำหรับตรวจสอบ
const users = [{username: "admin", password: "1234"}];

// ฟังก์ชันสำหรับเข้าสู่ระบบ
function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    const error = document.getElementById("error");

    const user = users.find(x => x.username === u && x.password === p);

    if (user) {
        sessionStorage.setItem("login", "true");
        window.location.href = "home.html";
    } else {
        // เพิ่มไอคอนแจ้งเตือนสีแดงหน้าข้อความผิดพลาด
        error.innerHTML = "<i class='fa-solid fa-circle-exclamation'></i> ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
    }
}

// ฟังก์ชันเปิด-ซ่อนรหัสผ่าน และสลับไอคอนดวงตา
function togglePass() {
    const pass = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");
    
    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// ฟังก์ชันตรวจจับการกดปุ่ม Enter บนแป้นพิมพ์เพื่อความสะดวกในการพิมพ์ล็อกอิน
function checkEnter(event) {
    if (event.key === "Enter") {
        login();
    }
}
</script>

</body>
</html>
