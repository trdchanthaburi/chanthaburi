<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก - ระบบข้อมูลที่ราชพัสดุ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-green: #007d32;
            --dark-green: #004d1f;
            --light-green: #4caf50;
            --text-dark: #333;
            /* เปลี่ยน URL รูปภาพตรงนี้ได้เลย */
            --bg-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80');
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* ตั้งค่าพื้นหลังเป็นรูปภาพ */
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            padding: 20px;
            overflow-x: hidden;
        }

        /* เลเยอร์สีเขียวเข้มโปร่งแสง เพื่อให้ตัวหนังสือเด่นขึ้น */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 45, 10, 0.45); /* ปรับค่า 0.45 เพื่อให้ภาพมืดลงหรือสว่างขึ้น */
            z-index: 0;
        }

        .menu-container {
            position: relative;
            z-index: 1;
            /* เอฟเฟกต์กระจกฝ้า (Glassmorphism) */
            background-color: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            height: 120px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }

        .header-group {
            margin-bottom: 35px;
        }

        h1 {
            font-family: 'Prompt', sans-serif;
            color: var(--primary-green);
            font-size: 1.8rem;
            font-weight: 600;
            margin: 5px 0;
            line-height: 1.3;
        }

        h1.highlight {
            color: var(--dark-green);
            font-size: 1.5rem;
            font-weight: 400;
        }

        p.subtitle {
            font-family: 'Prompt', sans-serif;
            color: #555;
            margin: 15px 0 0 0;
            font-size: 1.2rem;
            font-weight: 400;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .nav-card {
            background: white;
            border: 1px solid rgba(0, 125, 50, 0.2);
            color: var(--primary-green);
            text-decoration: none;
            padding: 35px 20px;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .nav-card i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }

        .nav-card span {
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-dark);
        }

        /* Hover Effect */
        .nav-card:hover {
            background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,77,31,0.4);
        }

        .nav-card:hover i {
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-card:hover span {
            color: white;
        }

        .footer {
            margin-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 20px;
        }

        .footer small {
            color: #666;
            font-size: 0.9rem;
        }

        /* สำหรับมือถือ */
        @media (max-width: 600px) {
            .menu-container {
                padding: 40px 20px;
            }
            .button-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.4rem; }
            h1.highlight { font-size: 1.2rem; }
            .nav-card { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/th/8/81/The_Treasury_Department_Logo.png" alt="Logo" class="logo">
    </div>
    
    <div class="header-group">
        <h1>ระบบสืบค้นราคาประเมินที่ราชพัสดุ</h1>
        <h1 class="highlight">(กรณีที่ไม่มีเอกสารสิทธิ์)</h1>
        <p class="subtitle">สำนักงานธนารักษ์พื้นที่จันทบุรี</p>
    </div>
    
    <div class="button-grid">
        <a href="data-2566-2569.html" class="nav-card">
            <i class="fas fa-search-location"></i>
            <span>รอบบัญชี 2566-2569</span>
        </a>

        <a href="data-2570-2573.html" class="nav-card">
            <i class="fas fa-map-marked-alt"></i>
            <span>รอบบัญชี 2570-2573</span>
        </a>
    </div>

    <div class="footer">
        <small>&copy; 2026 สำนักงานธนารักษ์พื้นที่จันทบุรี</small>
    </div>
</div>

</body>
</html>
